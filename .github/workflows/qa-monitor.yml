name: QA Monitor Daily Report

on:
  # 매일 지정 시각에 실행 (UTC 기준, KST = UTC + 9)
  # config.yaml user_map의 send_time과 맞춰야 합니다
  schedule:
    - cron: '0 5 * * 1-5'   # 평일 14:00 KST → 테스트 진행상황 (Cindy+Liana)
    - cron: '0 21 * * 0-4'  # 평일 06:00 KST → 운영모니터링 (Cindy+Liana)

    - cron: '0 1 * * 1-5'   # 평일 10:00 KST → PRD/Figma 변경 감시
    - cron: '0 6 * * 1-5'   # 평일 15:00 KST → PRD/Figma 변경 감시

  # 수동 실행 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:
    inputs:
      run_for:
        description: '특정 QAM만 실행 (비우면 전체)'
        required: false
        default: ''
      run_card:
        description: '특정 QA카드만 실행 (예: SUP-1557)'
        required: false
        default: ''

jobs:
  # 특정 카드 테스트 (수동 실행 전용)
  single-card:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_card != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run QA Monitor — Single Card
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          BUZZ_HTML_TOKEN: ${{ secrets.BUZZ_HTML_TOKEN }}
        run: python main.py --run-card ${{ github.event.inputs.run_card }}

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-dashboard
          path: output/
          retention-days: 30

  # PRD/Figma 변경 감시 (평일 10:00, 15:00 KST)
  watch-changes:
    if: github.event.schedule == '0 1 * * 1-5' || github.event.schedule == '0 6 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Restore snapshots cache
        uses: actions/cache@v4
        with:
          path: snapshots
          key: change-snapshots-${{ github.run_id }}
          restore-keys: |
            change-snapshots-

      - name: Run change watcher
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: python main.py --watch-changes

  # Cindy (스케줄 또는 수동)
  cindy:
    if: |
      github.event.schedule == '0 5 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_card == '' && (github.event.inputs.run_for == 'Cindy' || github.event.inputs.run_for == ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run QA Monitor — Cindy
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          BUZZ_HTML_TOKEN: ${{ secrets.BUZZ_HTML_TOKEN }}
        run: python main.py --run-for Cindy

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-dashboard-cindy
          path: output/
          retention-days: 30

  # Liana (스케줄 또는 수동)
  liana:
    if: |
      github.event.schedule == '0 5 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_card == '' && (github.event.inputs.run_for == 'Liana' || github.event.inputs.run_for == ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run QA Monitor — Liana
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          BUZZ_HTML_TOKEN: ${{ secrets.BUZZ_HTML_TOKEN }}
        run: python main.py --run-for Liana

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-dashboard-liana
          path: output/
          retention-days: 30

  # Cindy 운영모니터링 (스케줄 전용)
  cindy-monitoring:
    if: github.event.schedule == '0 21 * * 0-4'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run QA Monitor — Cindy 운영모니터링
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py --run-monitoring Cindy

  # Liana 운영모니터링 (스케줄 전용)
  liana-monitoring:
    if: github.event.schedule == '0 21 * * 0-4'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Run QA Monitor — Liana 운영모니터링
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py --run-monitoring Liana
