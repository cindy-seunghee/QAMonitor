name: PRD/Figma Change Watcher

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 09:00 KST
    - cron: '0 2 * * 1-5'   # 평일 11:00 KST
    - cron: '0 4 * * 1-5'   # 평일 13:00 KST
    - cron: '0 6 * * 1-5'   # 평일 15:00 KST
    - cron: '0 8 * * 1-5'   # 평일 17:00 KST

  workflow_dispatch:
    inputs:
      assignee:
        description: '특정 QAM만 대상 (비우면 전체). 본인 카드만 테스트하려면 이름 입력 (예: Cindy)'
        required: false
        default: ''
      force_links:
        description: '요구사항 링크 누락 DM 시간 게이트(09·15시) 무시'
        type: boolean
        required: false
        default: false

jobs:
  watch-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" > config.yaml

      - name: Restore snapshots cache
        uses: actions/cache@v4
        with:
          path: snapshots
          key: change-snapshots-${{ github.run_id }}
          restore-keys: |
            change-snapshots-

      - name: Ensure snapshots directory
        run: mkdir -p snapshots

      - name: Run change watcher
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
          ASSIGNEE: ${{ github.event.inputs.assignee }}
          FORCE_LINKS: ${{ github.event.inputs.force_links }}
        run: |
          ARGS="--watch-changes"
          if [ -n "$ASSIGNEE" ]; then ARGS="$ARGS $ASSIGNEE"; fi
          if [ "$FORCE_LINKS" = "true" ]; then ARGS="$ARGS --force-links"; fi
          echo "실행: python main.py $ARGS"
          python main.py $ARGS
